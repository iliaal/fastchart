name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    name: Validate composer.json
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer
          coverage: none
      - run: composer validate --strict

  pie-smoke:
    name: PIE install smoke
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: gd
          tools: phpize, php-config
          coverage: none
      - name: Install PIE build prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends bison libtool-bin libgd-dev
      - name: Download PIE
        run: |
          curl -fsSL -o /tmp/pie.phar https://github.com/php/pie/releases/latest/download/pie.phar
          chmod +x /tmp/pie.phar
      - name: PIE build smoke
        run: |
          php /tmp/pie.phar repository:add path .
          php /tmp/pie.phar build iliaal/fastchart:*@dev --enable-fastchart

  linux:
    name: PHP ${{ matrix.php }} - Linux
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4', '8.5']

    steps:
      - uses: actions/checkout@v6

      - name: Install libgd
        run: sudo apt-get update -qq && sudo apt-get install -y libgd-dev

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: gd
          tools: phpize, php-config

      - name: Build extension
        run: |
          phpize
          ./configure --enable-fastchart --enable-fastchart-dev
          WARNINGS=$(make -j$(nproc) 2>&1 | tee /dev/stderr | grep -c 'warning:' || true)
          if [ "$WARNINGS" -gt 0 ]; then
            echo "::error::Build produced $WARNINGS warning(s)"
            exit 1
          fi

      - name: Run tests
        run: |
          export TEST_PHP_EXECUTABLE=$(which php)
          export TEST_PHP_ARGS="-d extension=gd -d extension=$(pwd)/modules/fastchart.so"
          export NO_INTERACTION=1
          # Stream output so failure context lands in the log even
          # when the run aborts before the trailing summary. Tee to
          # a file so we can assert "Tests failed: N" cleanly.
          set +e
          php run-tests.php --show-diff -g FAIL,BORK,LEAK,XLEAK tests/ 2>&1 | tee /tmp/test-output.txt
          set -e
          if grep -qP '^Tests failed\s*:\s*[1-9]' /tmp/test-output.txt; then
            echo "::error::Tests failed on PHP ${{ matrix.php }} - Linux"
            grep -E '^FAIL\b|^FAILED TEST' /tmp/test-output.txt || true
            exit 1
          fi

  asan:
    name: PHP ${{ matrix.php }} - ASAN
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4']

    env:
      ASAN_OPTIONS: exitcode=139:verify_asan_link_order=0:detect_odr_violation=0
      UBSAN_OPTIONS: print_stacktrace=1
      USE_ZEND_ALLOC: 0
      USE_TRACKED_ALLOC: 1

    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y llvm clang re2c bison autoconf libgd-dev pkg-config

      - name: Build PHP with ASAN + ext/gd
        # Static libasan (default — no -shared-libasan flag) keeps
        # the configure-time C-program test happy on the ubuntu
        # runner. ASan symbols live in the php-cli binary; fastchart.so
        # gets instrumented and resolves callbacks against the host
        # process. ext/gd is built directly into the ASAN PHP so the
        # GdImage class entry exists at MINIT (fastchart's MINIT
        # looks it up in the class table).
        run: |
          git clone --depth=1 --branch=PHP-${{ matrix.php }} https://github.com/php/php-src.git /tmp/php-src
          cd /tmp/php-src
          ./buildconf --force
          CC=clang CXX=clang++ \
          CFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr -DZEND_TRACK_ARENA_ALLOC" \
          LDFLAGS="-fsanitize=address,undefined" \
          ./configure \
            --enable-debug \
            --disable-zts \
            --disable-all \
            --enable-cli \
            --enable-gd \
            --with-external-gd \
            --prefix=/tmp/php-asan
          make -j$(nproc)
          make install

      - name: Build fastchart with ASAN
        run: |
          export PATH="/tmp/php-asan/bin:$PATH"
          phpize
          CC=clang CXX=clang++ \
          CFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr -DZEND_TRACK_ARENA_ALLOC" \
          CXXFLAGS="-fsanitize=address,undefined -fno-sanitize=function,vptr -DZEND_TRACK_ARENA_ALLOC" \
          LDFLAGS="-fsanitize=address,undefined" \
          ./configure \
            --enable-fastchart --enable-fastchart-dev \
            --with-php-config=/tmp/php-asan/bin/php-config
          make -j$(nproc)

      - name: Run tests under ASAN
        run: |
          export TEST_PHP_EXECUTABLE=/tmp/php-asan/bin/php
          export TEST_PHP_ARGS="-d extension=gd -d extension=$(pwd)/modules/fastchart.so"
          export NO_INTERACTION=1
          /tmp/php-asan/bin/php run-tests.php --show-diff --asan -g FAIL,BORK,LEAK,XLEAK tests/ 2>&1 | tee /tmp/test-output.txt || true
          if grep -qP 'Tests failed\s*:\s*[1-9]' /tmp/test-output.txt; then
            echo "::error::Tests failed under ASAN"
            exit 1
          fi

  macos:
    name: PHP ${{ matrix.php }} - macOS
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']

    steps:
      - uses: actions/checkout@v6

      - name: Install libgd
        run: brew install gd

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: gd
          tools: phpize, php-config

      - name: Build extension
        run: |
          # macOS Homebrew installs gd into /opt/homebrew (Apple
          # Silicon) or /usr/local (Intel). configure's
          # gdImageCreateTrueColor-in--lgd probe doesn't search
          # those by default — point CPPFLAGS / LDFLAGS at the
          # right prefix or the build fails with "libgd not found".
          GD_PREFIX="$(brew --prefix gd)"
          export CPPFLAGS="-I${GD_PREFIX}/include"
          export LDFLAGS="-L${GD_PREFIX}/lib"
          phpize
          ./configure --enable-fastchart
          make -j$(sysctl -n hw.ncpu)

      - name: Run tests
        run: |
          export TEST_PHP_EXECUTABLE=$(which php)
          export TEST_PHP_ARGS="-d extension=gd -d extension=$(pwd)/modules/fastchart.so"
          export NO_INTERACTION=1
          set +e
          php run-tests.php --show-diff -g FAIL,BORK,LEAK,XLEAK tests/ 2>&1 | tee /tmp/test-output.txt
          set -e
          if grep -qP '^Tests failed\s*:\s*[1-9]' /tmp/test-output.txt; then
            echo "::error::Tests failed on PHP ${{ matrix.php }} - macOS"
            grep -E '^FAIL\b|^FAILED TEST' /tmp/test-output.txt || true
            exit 1
          fi
