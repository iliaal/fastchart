# detected from config.m4 PHP_CHECK_LIBRARY(gd, gdImageCreateTrueColor, ...)
#
# libgd is system-linked (not vendored). The freshness gate runs as
# warn-only for system-linked libs because distro packages typically
# lag upstream; refreshing the pin here keeps the warning quiet
# without forcing a hard fail when the build host is on an older
# distro.

resolver: github
repo: libgd/libgd
tag_regex: "gd-(.+)"
pinned: 2.3.3
